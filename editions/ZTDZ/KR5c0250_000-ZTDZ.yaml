front:
  text: 養生辯疑訣
  hash: sha256:03b7c2151eed438a6a5b3e2f18507b65b6db6fb2123b52320bffde932bfe720c
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0250_SJB_000-180559a, image: sjb/18/180559a.png}
body:
  text: 栖真子施肩吾述一氣無方與時消息萬物生死共氣盛衰處自然之間而皆不知所以然而然其所禀習在履載之下有形者先知其本知其本則求無不通脩道先須正其源正其源則流無不應若棄其本而外求背其源以邪究雖獵盡百家學窮諸子徒廣虚論功條其攝養之效得者觀之實爲自誤耳今歴觀世間好道之流不可勝數雖知恬淡以自守全不知恬淡之中有妙用矣雖知虚無以爲理全不知虚無之中而無不爲矣若不知虚無恬淡妙用之理徒委志於寂默之間妄作於形神之外是謂無益之用非攝生之鴻漸也且神由形住形以神留神苟外遷形亦難保抑又服餌草木金石以固其形而不知草木金石之性不究四時逆順之宜久而服之反傷和氣逺不出中年之内疾害俱生使夫輕薄之流皆謂繋風捕影不可得矣飜以學者爲不肖以真隱爲詭逍不亦傷哉惑人嘗以此事而譏余曰吾聞學道可致長生吾自童年至于暮齒見學道之人巳千數矣服氣絶粒者驅役考召者清靜無欲者修仙鍊行者如斯之流未有不聞其死者也身殁幽壤之下徒以尸解爲名推此而論之盖得者猶靈骨耳非可學而得之余聞斯論不覺心愍于内神恍于外沈吟之間乃太息而應之曰觀子向來所說實亦鄙之甚矣迷乏尤矣今世人學人間之事猶有成與不成又況妙本玄深昏昏默默胡可造次而得之且大道無親感之即應苟云靈骨無乃踈乎然夫服氣絶粒者且道家之所尚人苟得之皆有不食之功身輕乏效便自言腸胃無滓立致雲霓形體獲輕坐希鸞鶴採餌者復以毛女爲憑呼吸者人引靈龜作證曽不知真氣暗㓕胎精内枯猶執滯理於松筠守迷端於翰墨良可嗟矣寧所恠乎至於驅役考召之流盖是道中之法事硏討至精窮其真誥誡爲身外之虚名妄作人間之孟浪在巳無徴於延益於人有驗於軫攘亂構休祥徒陳禍福如斯之輩並匪保生之道也或以清靜無爲深居絶俗形同槁木志類死灰不知天地動用之心不察隂陽運行之理如此則雖遊恍惚其恍惚而無涯縱合窅冥其窅㝠而莫測飜使希夷之外神用罔然虚白之中玄關失守言議之際中有髙真喟然而嘆曰守一非一履真非真此亦近爲門階之由殊未窺其室中之用矣大凡保氣棲神不可以湛然而得之亦不可以元然而守之且神無方而氣常運形至靜而用無窮是知保氣者其要在乎運棲神者其祕在乎用吾嘗聞之於師曰體虚而氣周形静而神會此盖爲出世之玄機無名之大用矣養生辨疑訣
