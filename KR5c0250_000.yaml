front:
  text: 養生辨疑訣
  hash: sha256:f298e21b529017b8eb2fb139355fe0227c62d10888ec5793a7ddb2e84c4bbd81
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5c0250_HFL_000-001a, image: hfl/0575/0575-014.png}
body:
  text: 栖真子施肩吾述一氣無方與時消息萬物生死共氣盛衰處自然之間而皆不知所以然而然其所稟習在履載之下有形者先知其本知其本則求無不通修道先須正其源正其源則流無不應若棄其本而外求背其源以邪究雖獵盡百家學窮諸子徒廣虛論功條其攝養之效得者觀之實為自誤耳今歷觀世間好道之流不可勝數雖知恬淡以自守全不知恬淡之中有妙用矣雖知虛無以為理全不知虛無之中而無不為矣若不知虛無恬淡妙用之理徒委志於寂默之間妄作於形神之外是謂無益之用非攝生之鴻漸也且神由形住形以神留神苟外遷形亦難保抑又服餌草木金石以固其形而不知草木金石之性不究四時逆順之宜久而服之反傷和氣逺不出中年之內疾害俱生使夫輕薄之流皆謂繫風捕影不可得矣翻以學者為不肖以真隱為詭逍不亦傷哉惑人嘗以此事而譏余曰吾聞學道可致長生吾自童年至于暮齒見學道之人巳千數矣服氣絶粒者驅役考召者清靜無欲者修仙鍊行者如斯之流未有不聞其死者也身殁幽壤之下徒以尸解為名推此而論之蓋得者猶靈骨耳非可學而得之余聞斯論不覺心愍于內神恍于外沈吟之間乃太息而應之曰觀子向來所説實亦鄙之甚矣迷乏尤矣今世人學人間之事猶有成與不成又況妙本玄深昏昏默默胡可造次而得之且大道無親感之即應苟云靈骨無乃踈乎然夫服氣絶粒者且道家之所尚人苟得之皆有不食之功身輕乏效便自言腸胃無滓立致雲霓形體獲輕坐希鸞鶴採餌者復以毛女為憑呼吸者人引靈龜作證曽不知真氣暗滅胎精內枯猶執滯理於松筠守迷端於翰墨良可嗟矣寧所怪乎至於驅役考召之流蓋是道中之法事研討至精窮其真誥誡為身外之虛名妄作人間之孟浪在巳無徴於延益於人有驗於軫攘亂構休祥徒陳禍福如斯之輩並匪保生之道也或以清靜無為深居絶俗形同稿木志類死灰不知天地動用之心不察隂陽運行之理如此則雖遊恍惚其恍惚而無涯縱合窅冥其窅冥而莫測翻使希夷之外神用罔然虛白之中玄關失守言議之際中有髙真喟然而嘆曰守一非一履真非真此亦近為門階之由殊未窺其室中之用矣大凡保氣棲神不可以湛然而得之亦不可以元然而守之且神無方而氣常運形至靜而用無窮是知保氣者其要在乎運棲神者其祕在乎用吾嘗聞之於師曰體虛而氣周形靜而神會此蓋為出世之玄機無名之大用矣養生辨疑訣
